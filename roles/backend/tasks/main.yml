- name: run app_pre_requisites
  tags:
  - deployment
  ansible.builtin.import_role:
    name: common
    tasks_from: app_pre_req

- name: install npm packages
  tags:
  - deployment
  ansible.builtin.command: npm install
  args:
    chdir: /app    # to change directory to app

- name: copy the backend service
  ansible.builtin.template:
    src: backend.service.j2
    dest: /etc/systemd/system/backend.service

- name: install python mysql dependencies
  ansible.builtin.pip:    # to built mysql db from ansible 
    name:
    - PyMySQL
    - cryptography
    executable: pip3.9

- name: import data to mysql
  community.mysql.mysql_db:
      login_user: root
      login_password: "{{ mysql_root_password }}"
      login_host: "{{ login_host }}"
      target: /app/schema/backend.sql
      state: import
      name: all 

# - name: deamon reload
#   ansible.builtin.systemd_service:
#     daemon_reload: true
  notify:
  - deamon reload

- name: start and enable backend
  tags:
  - deployment
  ansible.builtin.service:
    name: backend
    state: restarted
    enabled: yes